<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shrew</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="shell">
      <header class="hero">
        <div class="hero-brand">
          <img
            class="hero-logo"
            src="/logo.png"
            alt="Shrew logo"
            onerror="this.style.display='none'"
          />
          <div class="hero-copy-block">
            <p class="eyebrow">Automation Control Surface</p>
            <h1>Shrew</h1>
            <p class="hero-copy">
              A small front door for recipes, flows, and healing runs.
            </p>
          </div>
        </div>
      </header>

      <main class="layout">
        <aside class="panel panel-list">
          <div class="panel-head">
            <h2>Recipes</h2>
            <div class="panel-actions">
              <button id="addButton" class="ghost-button" type="button">Add</button>
              <button id="refreshButton" class="ghost-button" type="button">Refresh</button>
            </div>
          </div>
          <div id="recipeList" class="recipe-list"></div>
        </aside>

        <section class="panel panel-main">
          <div class="panel-head">
            <div>
              <p class="section-kicker">Selected Flow</p>
              <h2 id="recipeTitle">Loading...</h2>
            </div>
            <button id="runButton" class="primary-button" type="button" disabled>Run Flow</button>
          </div>

          <div class="detail-grid">
            <section class="subpanel">
              <div class="subpanel-head">
                <h3>Actions</h3>
                <div id="actionSummary" class="chip-row"></div>
              </div>
              <ol id="stepList" class="step-list"></ol>
            </section>

            <section class="subpanel log-panel">
              <div class="subpanel-head">
                <h3>Run Output</h3>
                <span id="runStatus" class="status-pill idle">Idle</span>
              </div>
              <pre id="runOutput" class="log-output">Pick a recipe to inspect it here.</pre>
            </section>
          </div>
        </section>
      </main>
    </div>

    <div id="modalBackdrop" class="modal-backdrop hidden">
      <div class="modal-card">
        <div class="subpanel-head">
          <div>
            <p class="section-kicker">New Recipe</p>
            <h3>Add From Playwright Codegen</h3>
          </div>
          <button id="closeModalButton" class="ghost-button" type="button">Close</button>
        </div>

        <label class="field">
          <span>Recipe Name</span>
          <input id="recipeNameInput" type="text" placeholder="Waystar Claims" />
        </label>

        <label class="field">
          <span>Playwright Codegen</span>
          <textarea id="codegenInput" rows="16" placeholder="Paste Playwright codegen here..."></textarea>
        </label>

        <div class="modal-actions">
          <button id="createRecipeButton" class="primary-button" type="button">Create Recipe</button>
        </div>
      </div>
    </div>

    <script src="/app.js"></script>
  </body>
  </html>
